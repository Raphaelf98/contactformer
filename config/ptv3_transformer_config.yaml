DATA:
  classes: null
  data_path: /home/ssdArray/datasets/grasp_planning_datasets/acronym/acronym
  depth_augm:
    clip: 0.005
    gaussian_kernel: 0
    sigma: 0.001
  gripper_width: 0.08
  input_normals: false
  intrinsics: realsense
  labels:
    bin_weights:
    - 0.16652107
    - 0.21488856
    - 0.37031708
    - 0.55618503
    - 0.75124664
    - 0.93943357
    - 1.07824539
    - 1.19423112
    - 1.55731375
    - 3.17161779
    filter_z: true
    k: 1
    max_radius: 0.005
    num_neg_contacts: 0
    num_pos_contacts: 8000
    offset_bins:
    - 0
    - 0.00794435329
    - 0.0158887021
    - 0.0238330509
    - 0.0317773996
    - 0.0397217484
    - 0.0476660972
    - 0.055610446
    - 0.0635547948
    - 0.0714991435
    - 0.08
    to_gpu: false
    z_val: -0.1
  ndataset_points: 20000
  num_point: 2048
  num_test_scenes: 1000
  pc_augm:
    clip: 0.005
    occlusion_dropout_rate: 0.0
    occlusion_nclusters: 0
    sigma: 0.0
  raw_num_points: 20000
  scene_contacts_path: scene_contacts
  train_and_test: false
  train_on_scenes: true
  use_farthest_point: false
  use_uniform_quaternions: false
  view_sphere:
    distance_range:
    - 0.9
    - 1.3
    elevation:
    - 30
    - 150
LOSS:
  min_geom_loss_divisor: 1.0
  offset_loss_type: sigmoid_cross_entropy
  too_small_offset_pred_bin_factor: 0
  topk_confidence: 512
MODEL:
  set_abstraction: true
  farthest_point_sampling: false
  bin_offsets: true
  dir_vec_length_offset: false
  grasp_conf_head:
    conv1d: 1
    dropout_keep: 0.5
  grasp_dir_head:
    conv1d: 3
    dropout_keep: 0.7
  joint_head:
    conv1d: 4
    dropout_keep: 0.7
  joint_heads: false
  model: conatact_graspnet_model
  type: "PT-v3m1"
  in_channels: 320
  order: 
    - "z"
    - "z-trans"
    - "hilbert"
    - "hilbert-trans"
  stride: 
    - 2
    - 2
    - 2
  ENCODER:
    enc_depths: 
      - 1
      - 2
      - 6
      - 2
    enc_channels: 
      - 320
      - 384
      - 384
      - 512
    enc_num_head: 
      - 20
      - 24
      - 24
      - 32
    enc_patch_size: 
      - 1024
      - 1024
      - 1024
      - 1024
  DECODER:
    dec_depths: 
      - 2
      - 2
      - 2
    dec_channels: 
      - 256
      - 256
      - 384
    dec_num_head:
      - 16
      - 16
      - 24
    dec_patch_size: 
      - 1024
      - 1024
      - 1024
  mlp_ratio: 4
  qkv_bias: true
  qk_scale: null
  attn_drop: 0.0
  proj_drop: 0.0
  drop_path: 0.3
  shuffle_orders: true
  pre_norm: true
  enable_rpe: false
  enable_flash: true
  upcast_attention: false
  upcast_softmax: false
  pred_contact_approach: false
  pred_contact_base: false
  pred_contact_offset: true
  pred_contact_success: true
  pred_grasps_adds: true
  pred_grasps_adds_gt2pred: false
  pred_grasps_support_surface: false
  SET_ABSTRACTION:
    mlp_list:
    - - 32
      - 32
      - 64
    - - 64
      - 64
      - 128
    - - 64
      - 96
      - 128
    npoint: 2048
    num_sample_list:
    - 32
    - 64
    - 128
    radius_list:
    - 0.02
    - 0.04
    - 0.08
OPTIMIZER:
  seed: 43
  adds_gt2pred_loss_weight: 1
  adds_loss_weight: 10
  approach_cosine_loss_weight: 1
  backup_every: 200
  batch_size: 4
  bn_decay_clip: 0.99
  bn_decay_decay_rate: 0.5
  bn_decay_decay_step: 200000
  bn_init_decay: 0.5
  checkpoint_every: 100
  decay_rate: 0.7
  decay_step: 200000
  dir_cosine_loss_weight: 1
  learning_rate: 0.001
  max_epoch: 200
  momentum: 0.9
  offset_loss_weight: 1
  optimizer: adam
  print_every: 10
  score_ce_loss_weight: 1
  val_every: 1
  robot_val_every: 5
  support_surface_loss_weight: 10
  support_surface_loss_alpha: 0.25
  support_surface_loss_beta: 50
SCHEDULER:
  epoch: 50
  eval_epoch: 50
  optimizer:
    lr: 0.002
    type: AdamW
    weight_decay: 0.005
  param_dicts:
  - keyword: block
    lr: 0.0002
  scheduler:
    anneal_strategy: cos
    div_factor: 10.0
    final_div_factor: 100.0
    max_lr:
    - 0.002
    - 0.0002
    pct_start: 0.04
    type: OneCycleLR
TEST:
  allow_zero_margin: 0
  bin_vals: max
  center_to_tip: 0.0
  extra_opening: 0.005
  filter_thres: 0.0001
  first_thres: 0.05
  max_farthest_points: 150
  num_samples: 2048
  second_thres: 0.05
  with_replacement: true
