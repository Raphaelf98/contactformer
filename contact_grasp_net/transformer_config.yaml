    dropout_keep: 0.7
  grid_sizes:
  - 0.04
  - 0.08
  - 0.16
  in_channels: 320
  joint_head:
    conv1d: 4
    dropout_keep: 0.7
  joint_heads: false
  model: conatact_graspnet_model
  pe_bias: true
  pe_multiplier: false
  pred_contact_approach: false
  pred_contact_base: false
  pred_contact_offset: true
  pred_contact_success: true
  pred_grasps_adds: true
  pred_grasps_adds_gt2pred: false
  pred_grasps_centrality: true
  set_abstraction: true
  type: PT-v2
  unpool_backend: map
OPTIMIZER:
  seed: 43
  adds_gt2pred_loss_weight: 1
  adds_loss_weight: 10
  approach_cosine_loss_weight: 1
  backup_every: 200
  batch_size: 6
  bn_decay_clip: 0.99
  bn_decay_decay_rate: 0.5
  bn_decay_decay_step: 200000
  bn_init_decay: 0.5
  checkpoint_every: 100
  decay_rate: 0.7
  decay_step: 200000
  dir_cosine_loss_weight: 1
  learning_rate: 0.001
  max_epoch: 200
  momentum: 0.9
  offset_loss_weight: 1
  optimizer: adam
  print_every: 10
  score_ce_loss_weight: 1
  val_every: 1
  robot_val_every: 5
  centrality_loss_weight: 1
