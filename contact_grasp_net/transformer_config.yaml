  epoch: 50
  eval_epoch: 50
  optimizer:
    lr: 0.002
    type: AdamW
    weight_decay: 0.005
  param_dicts:
  - keyword: block
    lr: 0.0002
  scheduler:
    anneal_strategy: cos
    div_factor: 10.0
    final_div_factor: 100.0
    max_lr:
    - 0.002
    - 0.0002
    pct_start: 0.04
    type: OneCycleLR
TEST:
  allow_zero_margin: 0
  bin_vals: max
  center_to_tip: 0.0
  extra_opening: 0.005
  filter_thres: 0.0001
  first_thres: 0.05
  max_farthest_points: 150
  num_samples: 2048
  second_thres: 0.05
  with_replacement: true
